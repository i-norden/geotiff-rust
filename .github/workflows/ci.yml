name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run all-feature tests
        run: cargo test --workspace --all-features

      - name: Verify checked-in interoperability corpus
        run: ./scripts/fetch-interoperability-corpus.sh --verify-only

      - name: Verify fuzz seeds
        run: |
          ./scripts/seed-fuzz-corpus.sh
          git diff --exit-code -- fuzz/corpus

      - name: Run minimal TIFF tests
        run: cargo test -p tiff-reader --no-default-features

      - name: Run minimal GeoTIFF tests
        run: cargo test -p geotiff-reader --no-default-features

      - name: Run COG-only GeoTIFF tests
        run: cargo test -p geotiff-reader --no-default-features --features cog

      - name: Check fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml
